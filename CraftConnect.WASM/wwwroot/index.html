<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CraftConnect — Connect with Skilled Craftsmen</title>
    <meta name="description" content="CraftConnect connects skilled craftsmen with customers. Find the perfect craftsman for your project or showcase your skills to a wider audience." />
    <base href="/" />

    <!-- Google Fonts: Inter (body) + Space Grotesk (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap (preserved) + Bootstrap Icons -->
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- App CSS -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CraftConnect.WASM.styles.css" rel="stylesheet" />

    <style>
        /* ===== Branded Loading Screen ===== */
        #app {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f0f14;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .loading-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 50%, #f5a623 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(124, 92, 252, 0.15);
            border-top-color: #7c5cfc;
            animation: loader-spin 0.8s linear infinite;
        }

        .loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #6b7280;
            letter-spacing: 0.05em;
        }

        @keyframes loader-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="loading-container">
            <span class="loading-logo">CraftConnect</span>
            <div class="loading-spinner"></div>
            <span class="loading-text">Loading application...</span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <!-- Theme helper: allows Blazor to set data-theme on <html> -->
    <script>
        window.themeInterop = {
            setTheme: function (theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('craftconnect-theme', theme);
            },
            getStoredTheme: function () {
                return localStorage.getItem('craftconnect-theme') || 'dark';
            }
        };

        // Apply stored theme immediately to prevent flash
        (function () {
            var stored = localStorage.getItem('craftconnect-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', stored);
        })();
    </script>
</body>

</html>
